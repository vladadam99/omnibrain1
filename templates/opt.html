<!DOCTYPE html>
<html>
<head>
    <title>MACD vs RSI Strategy Heatmap (Sharpe Ratio)</title>
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin: 32px;
            font-size: 2.2em;
            text-align: center;
            font-weight: 700;
        }
        #heatmap {
            width: 90vw;
            max-width: 1000px;
            margin: 0 auto 64px auto;
            background: #181b1f;
            border-radius: 16px;
            box-shadow: 0 2px 16px #0005;
            padding: 32px;
        }
    </style>
</head>
<body>
    <h1>MACD vs RSI Strategy Heatmap <span style="font-size:0.7em; font-weight:400;">(Sharpe Ratio)</span></h1>
    <div id="heatmap"></div>
    <a href="/" style="display:block; text-align:center; margin-bottom:2em;">
        <button class="btn btn-primary">← Back to Dashboard</button>
    </a>
    <script>
        // Server data
        let chartData = {{ chart_data | tojson }};
        let xLabels = {{ x_labels | tojson }};
        let yLabels = {{ y_labels | tojson }};

        // Prepare z matrix
        let z = [];
        let text = [];
        for (let i = 0; i < yLabels.length; i++) {
            z.push([]);
            text.push([]);
            for (let j = 0; j < xLabels.length; j++) {
                let v = null;
                for (let c = 0; c < chartData.length; c++) {
                    if (chartData[c].x == xLabels[j] && chartData[c].y == yLabels[i]) {
                        v = chartData[c].v;
                        break;
                    }
                }
                z[i].push(v);
                text[i].push(`MACD_fast: <b>${yLabels[i]}</b><br>MACD_slow: <b>${xLabels[j]}</b><br>Sharpe: <b>${v}</b>`);
            }
        }

        let data = [{
            z: z,
            x: xLabels,
            y: yLabels,
            text: text,
            hoverinfo: 'text',
            type: 'heatmap',
            colorscale: [
                [0, 'rgb(220,53,69)'], // Red
                [0.5, 'rgb(255, 230, 0)'], // Yellow
                [1, 'rgb(40, 167, 69)']   // Green
            ],
            showscale: true,
            colorbar: {
                title: "Sharpe Ratio",
                titleside: "right"
            }
        },
        {
            z: z,
            x: xLabels,
            y: yLabels,
            type: 'heatmap',
            colorscale: 'Greys',
            opacity: 0,
            showscale: false,
            text: z.map(row => row.map(val => val !== null ? `<b>${val}</b>` : "")),
            hoverinfo: 'skip'
        }
        ];

        let annotations = [];
        for (let i = 0; i < yLabels.length; i++) {
            for (let j = 0; j < xLabels.length; j++) {
                let currentValue = z[i][j];
                if (currentValue !== null && !isNaN(currentValue)) {
                    annotations.push({
                        x: xLabels[j],
                        y: yLabels[i],
                        text: `<b>${currentValue}</b>`,
                        font: { color: "white", size: 14 },
                        showarrow: false
                    });
                }
            }
        }

        let layout = {
            title: "",
            annotations: annotations,
            margin: { t: 40, l: 80, r: 40, b: 80 },
            xaxis: {
                title: "MACD Slow",
                tickvals: xLabels,
                tickfont: { color: "#fff" }
            },
            yaxis: {
                title: "MACD Fast",
                tickvals: yLabels,
                tickfont: { color: "#fff" }
            },
            plot_bgcolor: "#181b1f",
            paper_bgcolor: "#181b1f"
        };

        Plotly.newPlot('heatmap', data, layout, {responsive:true});
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</body>
</html>
