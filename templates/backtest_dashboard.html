<!DOCTYPE html>
<html>
<head>
    <title>📊 Backtest Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="background-color:#111; color:white; padding:2em;">
    <h1>📈 OMNIBRAIN Backtest Dashboard</h1>

    <div id="equity-curve" style="height:400px;"></div>
    <hr class="text-white">
    <div id="drawdown-curve" style="height:400px;"></div>
    <hr class="text-white">
    <div id="scatter-trades" style="height:400px;"></div>

    <a href="/" class="btn btn-secondary mt-4">← Back to Dashboard</a>

    <script>
        const equity = {{ equity_curve | safe }};
        const drawdown = {{ drawdowns | safe }};
        const trade_scatter = {{ trades | safe }};

        Plotly.newPlot('equity-curve', [{
            x: equity.map(d => d.timestamp),
            y: equity.map(d => d.equity),
            mode: 'lines',
            line: { color: 'lime' },
            name: 'Equity'
        }], {
            title: 'Equity Curve',
            paper_bgcolor: '#111',
            plot_bgcolor: '#111',
            font: { color: 'white' }
        });

        Plotly.newPlot('drawdown-curve', [{
            x: drawdown.map(d => d.timestamp),
            y: drawdown.map(d => d.drawdown),
            mode: 'lines',
            line: { color: 'red' },
            name: 'Drawdown'
        }], {
            title: 'Drawdown Over Time',
            paper_bgcolor: '#111',
            plot_bgcolor: '#111',
            font: { color: 'white' }
        });

        Plotly.newPlot('scatter-trades', [{
            x: trade_scatter.map(d => d.entry),
            y: trade_scatter.map(d => d.exit),
            text: trade_scatter.map(d => d.strategy),
            mode: 'markers',
            marker: {
                color: trade_scatter.map(d => d.result === 'win' ? 'lime' : 'red'),
                size: 10
            },
            name: 'Trades'
        }], {
            title: 'Trade Entry vs Exit Scatter',
            paper_bgcolor: '#111',
            plot_bgcolor: '#111',
            font: { color: 'white' }
        });
    </script>
</body>
</html>
