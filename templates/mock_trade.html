<!DOCTYPE html>
<html>
<head>
    <title>Execute Mock Trade</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="background-color: #111; color: white; padding: 2em;">
    <h1>🎯 Execute Mock Trade</h1>

    <p class="text-muted">
        Mode: <strong>{{ '🧪 Paper Trading' if defaults.paper_trading else '💰 Live Trading' }}</strong>
    </p>

    <form action="/trade" method="POST" class="mt-4">
        <div class="mb-3">
            <label for="symbol" class="form-label">Symbol</label>
            <input type="text" class="form-control" id="symbol" name="symbol" value="{{ defaults.default_symbol }}" required>
        </div>
        <div class="mb-3">
            <label for="strategy" class="form-label">Strategy</label>
            <input type="text" class="form-control" id="strategy" name="strategy" 
                   value="MACD({{ defaults.default_macd[0] }},{{ defaults.default_macd[1] }}) + RSI({{ defaults.default_rsi[0] }},{{ defaults.default_rsi[1] }})" required>
        </div>
        <div class="mb-3">
            <label for="side" class="form-label">Side</label>
            <select class="form-control" id="side" name="side">
                <option value="buy">Buy</option>
                <option value="sell">Sell</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="entry" class="form-label">Entry Price</label>
            <input type="number" step="0.01" class="form-control" id="entry" name="entry" value="0.0" required>
        </div>
        <div class="mb-3">
            <label for="exit" class="form-label">Exit Price</label>
            <input type="number" step="0.01" class="form-control" id="exit" name="exit" value="0.0" required>
        </div>
        <button type="submit" class="btn btn-success">💥 Execute Trade</button>
        <a href="/" class="btn btn-secondary ms-2">← Back to Dashboard</a>
    </form>
</body>
</html>
